    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a1110; 
            color: #ffffff;
            overflow-x: hidden;
        }
        .hero-gradient {
            background: radial-gradient(circle at 20% 30%, rgba(20, 45, 40, 0.8) 0%, rgba(10, 17, 16, 1) 100%);
        }
        .chat-window {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            color: #333;
            transition: opacity 0.5s ease, filter 0.5s ease;
        }
        .chat-window.night-mode {
            opacity: 0.6;
            filter: grayscale(0.8);
            pointer-events: none;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }
        .btn-green {
            background-color: #10b981;
            transition: all 0.3s ease;
        }
        .btn-green:hover {
            background-color: #059669;
            transform: translateY(-2px);
        }
        .message-anim {
            animation: slideIn 0.2s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .stats-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .disconnect-flash {
            animation: flashRed 0.5s ease-in-out;
        }
        @keyframes flashRed {
            0% { color: #4ade80; }
            50% { color: #f87171; }
            100% { color: #4ade80; }
        }
        .verified-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #1d9bf0;
            color: white;
            border-radius: 50%;
            width: 10px;
            height: 10px;
            font-size: 7px;
            margin-left: 2px;
        }
        .singer-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #1d9bf0;
            color: white;
            border-radius: 50%;

            height: 12px;

        function getRandomUser() {
            const roll = Math.random();
            
            // 8% chance for a singer

            const phrase = loc.phrases[Math.floor(Math.random() * loc.phrases.length)];

                country: loc.country,

                verified: false,

            };

        function renderMessage(user, text, isMe = false) {
            const loader = document.getElementById('initLoader');
            if (loader) loader.remove();

            const div = document.createElement('div');
            div.className = `flex ${isMe ? 'justify-end' : 'justify-start'} message-anim`;
            
            const isVerified = !isMe && user.verified;
            const isSinger = !isMe && user.type === "singer";
            const name = typeof user === 'string' ? user : user.name;
            const country = user.country || '';

            div.innerHTML = `
                <div class="max-w-[80%] ${isMe ? 'bg-green-100 text-green-900' : 'bg-gray-100 text-gray-800'} rounded-2xl px-4 py-2 text-xs shadow-sm">

                        ${isVerified ? '<span class="verified-badge">✓</span>' : ''}
                        ${isSinger ? '<span class="singer-badge">♪</span>' : ''}
                    </p>
                    <p>${text}</p>
                </div>
            `;
            chatBox.appendChild(div);
            if (chatBox.childNodes.length > 35) chatBox.removeChild(chatBox.firstChild);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function updateSimulation() {
            const now = new Date();
            const hour = now.getHours();
            
            // Nočný režim: od 00:00 do 07:59:59
            const isNightTime = (hour >= 0 && hour < 8);
            
            if (isNightTime) {
                if (!isNight) {
                    isNight = true;
                    chatWrapper.classList.add('night-mode');
                    modeStatus.innerText = "NOČNÝ REŽIM (UTLMENIE)";
                    chatStatusLabel.innerText = "OFFLINE - NOČNÝ REŽIM (8:00 REŠTART)";
                    messageInput.disabled = true;
                    messageInput.placeholder = "Komunita spí (Nočný režim)...";
                    sendBtn.disabled = true;
                    chatBox.innerHTML = '<div class="h-full flex flex-col items-center justify-center text-gray-400 text-[10px] uppercase font-bold tracking-widest text-center space-y-2"><div>Čet je v noci odpojený</div><div class="text-[8px] opacity-50">Automatické spustenie o 08:00 ráno</div></div>';
                }
                
                if (currentOnline > 620) {
                    currentOnline -= (currentOnline - 620) * 0.12;
                } else {
                    currentOnline = 620 + (Math.random() * 5);
                }
            } else {
                // Ak práve odbila 8:00 a bol nočný režim, reštartujeme prostredie
                if (isNight) {
                    isNight = false;
                    chatWrapper.classList.remove('night-mode');
                    modeStatus.innerText = "Globálna Fanúšikovská Základňa";
                    chatStatusLabel.innerText = "BoosingBassTV Community";
                    messageInput.disabled = false;
                    messageInput.placeholder = "Napíš niečo...";
                    sendBtn.disabled = false;
                    chatBox.innerHTML = ''; // Vyčistiť nočnú správu
                    autoSpam(); // Znova spustiť aktivitu
                }

                const totalSecondsInDay = (now.getHours() * 3600) + (now.getMinutes() * 60) + now.getSeconds();
                const cycleSeconds = 3 * 3600; 
                const cyclePhase = (totalSecondsInDay % cycleSeconds) / cycleSeconds;
                const growthBase = 92500; 
                const spikeFactor = Math.sin(cyclePhase * Math.PI);
                const joinRate = growthBase + (spikeFactor * 20000) + (Math.random() * 5000);
                
                const slowLeave = currentOnline * 0.00005;
                currentOnline += (joinRate - slowLeave);

                secondsCounter++;
                if (secondsCounter >= 20) {
                    currentOnline -= 10000;
                    secondsCounter = 0;
                    realTimeEl.classList.add('disconnect-flash');
                    setTimeout(() => realTimeEl.classList.remove('disconnect-flash'), 500);
                }
            }

            if (currentOnline >= targetOnline) currentOnline = targetOnline - (Math.random() * 50000);
             onlineCountEl.innerText = Math.floor(currentOnline).toLocaleString();

            const h = now.getHours().toString().padStart(2, '0');
            const m = now.getMinutes().toString().padStart(2, '0');
            const s = now.getSeconds().toString().padStart(2, '0');
            realTimeEl.innerText = `${h}:${m}:${s}`;
        }

        function autoSpam() {
            if (isNight) return;

            const u = getRandomUser();
            const messageProbability = Math.min(0.96, 0.25 + (currentOnline / 150000000));
            
            if(Math.random() < messageProbability) {
                const msg = Array.isArray(u.phrases) ? u.phrases[Math.floor(Math.random() * u.phrases.length)] : u.phrase;
                renderMessage(u, msg);
            }

            const delay = currentOnline > 10000000 ? 120 : 900;
            setTimeout(autoSpam, Math.random() * delay + 40);
        }

        setInterval(updateSimulation, 1000);
        updateSimulation();

        // Inicializácia četu (ak nie je noc)
        if (!isNight) {
            setTimeout(autoSpam, 2000);
            setTimeout(autoSpam, 2200);
            setTimeout(autoSpam, 2400);
        }

        document.getElementById('messageForm').onsubmit = (e) => {
            e.preventDefault();
            if (isNight) return;
            const input = document.getElementById('messageInput');
            if(!input.value) return;
            renderMessage("Ja", input.value, true);
            input.value = '';
        };
    </script>
</body>
</html>
